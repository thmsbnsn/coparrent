version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Indianapolis
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Indianapolis
    open-pull-requests-limit: 3
    labels:
      - dependencies
    commit-message:
      prefix: ci
